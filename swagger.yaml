  /api/v1/user/cart/product/inventory/hold/{id}:
    patch:
      tags:
        - Inventory
      summary: Update reserved stock
      description: Adds or subtracts reserved stock for a product. Used for cart operations. Requires authentication (admin or user role).
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservedStockRequest'
      responses:
        '200':
          description: Reserved stock updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventorySuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal server error (may include validation errors)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/catalog:
    get:
      tags:
        - Catalog
      summary: Get product catalog
      description: Retrieves all products with available stock (stock > 0). Includes product details, category info, price, and stock information. Requires authentication (admin or user role).
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Catalog retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT authentication token. Format -> Authorization Bearer {token}

  schemas:
    LoginRequest:
      type: object
      required:
        - Email
        - Password
      properties:
        Email:
          type: string
          format: email
          example: "envios@perdidos.com"
        Password:
          type: string
          minLength: 8
          example: "ExamplePassword123!"

    RegisterRequest:
      type: object
      required:
        - Email
        - Password
        - Name
        - Phone
      properties:
        Email:
          type: string
          format: email
          example: "envios@perdidos.com"
        Password:
          type: string
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$'
          example: "ExamplePassword123!"
        Name:
          type: string
          minLength: 2
          example: "Norbey Mejia"
        Phone:
          type: number
          example: 3164624691

    AuthResponse:
      type: object
      properties:
        msg:
          type: string
          example: "Token generated"
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            name:
              type: string
            phone:
              type: string

    ErrorResponse:
      type: object
      properties:
        type:
          type: string
          example: "Unauthorized"
        msg:
          type: string
          example: "Invalid credentials (wrong email or password)"

    UserRequest:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
        - idType
        - idNumber
        - roleId
        - gender
        - birthDate
        - status
        - country
        - state
        - city
        - neighborhood
        - address
        - postalCode
        - createdAt
        - updatedAt
