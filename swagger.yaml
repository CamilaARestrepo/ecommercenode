        price:
          type: number
          minimum: 0
          description: Product selling price (must be greater than 0)
          example: 1500.00
        stock:
          type: number
          minimum: 0
          description: Available stock (must be integer >= 0)
          example: 100

    ReservedStockRequest:
      type: object
      required:
        - reservedStock
        - action
      properties:
        reservedStock:
          type: number
          minimum: 1
          description: Amount of stock to reserve or release (must be positive)
          example: 3
        action:
          type: number
          enum: [1, 2]
          description: "Action to perform: 1 = add reserved stock, 2 = subtract reserved stock"
          example: 1

