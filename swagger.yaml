          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/admin/product//provider:
    get:
      tags:
        - Providers
      summary: Get all providers
      description: Retrieves all providers. Requires authentication and admin role.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Providers retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvidersListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/admin/product/provider/{id}:
    get:
      tags:
        - Providers
      summary: Get provider by ID
      description: Retrieves a specific provider by its ID. Requires authentication and admin role.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Provider ID
          schema:
            type: string
            example: "507f1f77bcf86cd799439013"
      responses:
        '200':
          description: Provider retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '404':
          description: Provider not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Provider not found"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

    put:
      tags:
        - Providers
      summary: Update a provider
      description: Updates an existing provider. Requires authentication and admin role.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Provider ID to update
          schema:
            type: string
            example: "507f1f77bcf86cd799439013"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderRequest'
      responses:
        '200':
          description: Provider updated successfully
          content:
            application/json:
