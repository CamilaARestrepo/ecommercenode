openapi: 3.0.0
info:
  title: Electiva2 Ecommerce API
  version: 1.0.0
  description: API documentation for Electiva2 Ecommerce - Envios Perdidos

servers:
  - url: http://localhost:5000

tags:
  - name: User
    description: User management
  - name: Auth
    description: Authentication endpoints
  - name: Product
    description: Product catalog
  - name: Preorder
    description: Checkout and preorders
  - name: Order
    description: Orders

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a user and generate an access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user:
    post:
      tags: [User]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/product:
    get:
      tags: [Product]
      summary: List all active products with stock > 0
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
    post:
      tags: [Product]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/{userId}/preorder:
    post:
      tags: [Preorder]
      summary: Create a new preorder (checkout)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreOrderRequest'
      responses:
        '201':
          description: Preorder created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreOrderResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/{userId}/preorder/{preorderId}/confirm:
    patch:
      tags: [Preorder]
      summary: Confirm a preorder and create an order
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: preorderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                emailNotification:
                  type: string
                  format: email
      responses:
        '200':
          description: Preorder confirmed and order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  preorder:
                    $ref: '#/components/schemas/PreOrderResponse'
                  order:
                    $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Invalid preorder status or insufficient stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Preorder not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/orders/user/{userId}:
    get:
      tags: [Order]
      summary: Get all orders for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    RegisterRequest:
      type: object
      required: [email, password, name, phone]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
        phone:
          type: string

    AuthResponse:
      type: object
      properties:
        msg:
          type: string
        token:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            name:
              type: string
            phone:
              type: string

    ErrorResponse:
      type: object
      properties:
        type:
          type: string
        msg:
          type: string

    UserRequest:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
        - idType
        - idNumber
        - roleId
        - status
        - country
        - state
        - city
        - neighborhood
        - address
        - postalCode
      properties:
        email:
          type: string
          format: email
          description: Correo electrónico único del usuario
          example: usuario@correo.com
        password:
          type: string
          description: Contraseña segura (mínimo 8 caracteres, mayúsculas, minúsculas y números)
          example: Prueba123
        firstName:
          type: string
          description: Nombre del usuario
          example: Juan
        lastName:
          type: string
          description: Apellido del usuario
          example: Pérez
        idType:
          type: string
          description: Tipo de documento (cc, ti, etc)
          example: cc
        idNumber:
          type: string
          description: Número de documento
          example: 123456789
        phone:
          type: string
          description: Teléfono del usuario
          example: 3161234567
        roleId:
          type: string
          description: Rol del usuario
          enum: [USER, ADMIN]
          example: USER
        status:
          type: string
          description: Estado del usuario
          enum: [ACTIVE, INACTIVE, BLOCKED]
          example: ACTIVE
        country:
          type: string
          example: Colombia
        state:
          type: string
          example: Antioquia
        city:
          type: string
          example: Medellín
        neighborhood:
          type: string
          example: Laureles
        address:
          type: string
          example: Calle 50 #70-30
        postalCode:
          type: string
          example: 050001

    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        idType:
          type: string
        idNumber:
          type: string
        phone:
          type: string
        roleId:
          type: string
        status:
          type: string
        country:
          type: string
        state:
          type: string
        city:
          type: string
        neighborhood:
          type: string
        address:
          type: string
        postalCode:
          type: string

    ProductRequest:
      type: object
      required:
        - name
        - description
        - cost
        - categoryId
        - images
        - providers
      properties:
        name:
          type: string
          description: Nombre del producto
          example: Camiseta
        description:
          type: string
          description: Descripción del producto
          example: Camiseta de algodón talla M
        cost:
          type: number
          description: Precio del producto
          example: 35000
        categoryId:
          type: string
          description: ID de la categoría
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        images:
          type: array
          description: Imágenes del producto (mínimo una)
          items:
            type: string
            example: https://miapp.com/img/camiseta.jpg
        providers:
          type: array
          description: IDs de proveedores
          items:
            type: string
            example: 60f1c2e2b2e4b2e4b2e4b2e4

    ProductResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        cost:
          type: number
        categoryId:
          type: string
        images:
          type: array
          items:
            type: string
        providers:
          type: array
          items:
            type: string

    PreOrderRequest:
      type: object
      required:
        - userId
        - products
        - shippingAddress
        - paymentMethod
      properties:
        userId:
          type: string
          description: ID del usuario
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        products:
          type: array
          description: Productos en la preorden
          items:
            $ref: '#/components/schemas/PreOrderProduct'
        shippingAddress:
          $ref: '#/components/schemas/PreOrderShippingAddress'
        paymentMethod:
          type: string
          description: Método de pago
          example: tarjeta

    PreOrderProduct:
      type: object
      required:
        - productId
        - name
        - quantity
        - price
        - categoryId
      properties:
        productId:
          type: string
          description: ID del producto
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        name:
          type: string
          description: Nombre del producto
          example: Camiseta
        description:
          type: string
          description: Descripción del producto
          example: Camiseta de algodón talla M
        quantity:
          type: integer
          description: Cantidad solicitada
          example: 2
        price:
          type: number
          description: Precio unitario
          example: 35000
        categoryId:
          type: string
          description: ID de la categoría
          example: 60f1c2e2b2e4b2e4b2e4b2e4

    PreOrderShippingAddress:
      type: object
      required:
        - country
        - state
        - city
        - neighborhood
        - address
        - postalCode
      properties:
        country:
          type: string
          example: Colombia
        state:
          type: string
          example: Antioquia
        city:
          type: string
          example: Medellín
        neighborhood:
          type: string
          example: Laureles
        address:
          type: string
          example: Calle 50 #70-30
        postalCode:
          type: string
          example: 050001

    PreOrderResponse:
      type: object
      properties:
        id:
          type: string
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        userId:
          type: string
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        products:
          type: array
          items:
            $ref: '#/components/schemas/PreOrderProduct'
        shippingAddress:
          $ref: '#/components/schemas/PreOrderShippingAddress'
        paymentMethod:
          type: string
          example: tarjeta
        shippingCost:
          type: number
          example: 10000
        total:
          type: number
          example: 80000
        status:
          type: string
          enum: [PENDING, EXPIRED, CANCELLED, CONFIRMED]
          example: PENDING
        createdAt:
          type: string
          format: date-time
          example: "2024-06-10T12:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-10T12:00:00Z"

    OrderResponse:
      type: object
      properties:
        id:
          type: string
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        orderNumber:
          type: string
          example: ORD-20240610-ABCDE
        preorderId:
          type: string
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        userId:
          type: string
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        products:
          type: array
          items:
            $ref: '#/components/schemas/PreOrderProduct'
        shippingAddress:
          $ref: '#/components/schemas/PreOrderShippingAddress'
        paymentMethod:
          type: string
          example: tarjeta
        shippingCost:
          type: number
          example: 10000
        total:
          type: number
          example: 80000
        status:
          type: string
          enum: [PENDING, CONFIRMED, PROCESSING, SHIPPED, DELIVERED, CANCELLED, REFUNDED]
          example: PENDING
        createdAt:
          type: string
          format: date-time
          example: "2024-06-10T12:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-10T12:00:00Z"
        confirmedAt:
          type: string
          format: date-time
          example: "2024-06-10T12:05:00Z"
        emailSent:
          type: boolean
          example: true