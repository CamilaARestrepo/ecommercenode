          maxLength: 50
          example: "Laptop Dell Inspiron"
        description:
          type: string
          minLength: 10
          maxLength: 500
          example: "High performance laptop with Intel i7 processor"
        cost:
          type: number
          minimum: 0
          example: 1200.50
        stock:
          type: number
          minimum: 0
          example: 50
        categoryId:
          type: string
          example: "507f1f77bcf86cd799439012"
        images:
          type: array
          items:
            type: string
          example: ["https://example.com/image1.jpg"]
        providers:
          type: array
          items:
            type: string
          example: ["507f1f77bcf86cd799439013"]
        isDiscontinued:
          type: boolean
          example: false

