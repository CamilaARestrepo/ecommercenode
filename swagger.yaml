openapi: 3.0.0
info:
  title: Electiva2 Ecommerce API
  version: 1.0.0
  description: API documentation for Electiva2 Ecommerce - Envios Perdidos

servers:
  - url: http://localhost:5000

tags:
  - name: User
    description: User management
  - name: Auth
    description: Authentication endpoints

paths:
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate a user and generate an access token
      description: |
        In addition to authenticating the user and generating a token, this endpoint now tracks login attempts and stores the user's email in the login attempts table for auditing purposes. After 3 failed login attempts, the user will be blocked and unable to log in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user:
    post:
      tags:
        - User
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  error:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                  error:
                    type: string

components:
  schemas:
    LoginRequest:
      type: object
      required:
        - Email
        - Password
      properties:
        Email:
          type: string
          format: email
          example: "envios@perdidos.com"
        Password:
          type: string
          minLength: 8
          example: "ExamplePassword123!"

    RegisterRequest:
      type: object
      required:
        - Email
        - Password
        - Name
        - Phone
      properties:
        Email:
          type: string
          format: email
          example: "envios@perdidos.com"
        Password:
          type: string
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$'
          example: "ExamplePassword123!"
        Name:
          type: string
          minLength: 2
          example: "Norbey Mejia"
        Phone:
          type: number
          example: 3164624691

    AuthResponse:
      type: object
      properties:
        msg:
          type: string
          example: "Token generated"
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            name:
              type: string
            phone:
              type: string

    ErrorResponse:
      type: object
      properties:
        type:
          type: string
          example: "Unauthorized"
        msg:
          type: string
          example: "Invalid credentials (wrong email or password)"

    UserRequest:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
        - idType
        - idNumber
        - roleId
        - gender
        - birthDate
        - status
        - country
        - state
        - city
        - neighborhood
        - address
        - postalCode
        - createdAt
        - updatedAt
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        idType:
          type: string
        idNumber:
          type: string
        phone:
          type: string
        roleId:
          type: string
        gender:
          type: string
        birthDate:
          type: string
          format: date
        status:
          type: string
          enum: [ACTIVE, INACTIVE, BLOCKED]
        country:
          type: string
        state:
          type: string
        city:
          type: string
        neighborhood:
          type: string
        address:
          type: string
        postalCode:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        paymentMethodId:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        idType:
          type: string
        idNumber:
          type: string
        phone:
          type: string
        roleId:
          type: string
        gender:
          type: string
        birthDate:
          type: string
          format: date
        status:
          type: string
          enum: [ACTIVE, INACTIVE, BLOCKED]
        country:
          type: string
        state:
          type: string
        city:
          type: string
        neighborhood:
          type: string
        address:
          type: string
        postalCode:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        paymentMethodId:
          type: string