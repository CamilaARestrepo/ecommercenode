        price:
          type: number
          minimum: 0
          description: Product selling price
          example: 1500.00
        stock:
          type: number
          minimum: 0
          description: Available stock
          example: 100
        reservedStock:
          type: number
          minimum: 0
          description: Stock reserved in carts
          example: 5

    InventoryUpdateRequest:
      type: object
