    # Product Schemas
    Product:
      type: object
      required:
        - name
        - description
        - cost
        - categoryId
        - providers
      properties:
        id:
          type: string
          description: Product unique ID
          example: "507f1f77bcf86cd799439011"
        name:
          type: string
          minLength: 3
          maxLength: 50
          description: Product name
          example: "Laptop Dell Inspiron"
        description:
          type: string
          minLength: 10
          maxLength: 500
          description: Product description
          example: "High performance laptop with Intel i7 processor"
        cost:
          type: number
          minimum: 0
          description: Product cost
          example: 1200.50
        stock:
          type: number
          minimum: 0
          description: Available stock
          example: 50
        categoryId:
          type: string
          description: Category ID
          example: "507f1f77bcf86cd799439012"
        images:
          type: array
          items:
            type: string
          description: Product images URLs
          example: ["https://example.com/image1.jpg", "https://example.com/image2.jpg"]
        providers:
          type: array
          items:
            type: string
          description: Provider IDs
          example: ["507f1f77bcf86cd799439013"]
        isDiscontinued:
          type: boolean
          description: Indicates if product is discontinued
          example: false

    ProductRequest:
      type: object
      required:
        - name
        - description
        - cost
        - categoryId
        - providers
      properties:
        name:
          type: string
