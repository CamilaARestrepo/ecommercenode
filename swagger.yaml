openapi: 3.0.0
info:
  title: Electiva2 Ecommerce API
  version: 1.0.0
  description: API documentation for Electiva2 Ecommerce - Envios Perdidos

servers:
  - url: http://localhost:5000

tags:
  - name: User
    description: User management

paths:
  /api/v1/user:
    post:
      tags:
        - User
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  error:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                  error:
                    type: string

components:
  schemas:
    UserRequest:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
        - idType
        - idNumber
        - roleId
        - gender
        - birthDate
        - status
        - country
        - state
        - city
        - neighborhood
        - address
        - postalCode
        - createdAt
        - updatedAt
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        idType:
          type: string
        idNumber:
          type: string
        phone:
          type: string
        roleId:
          type: string
        gender:
          type: string
        birthDate:
          type: string
          format: date
        status:
          type: string
          enum: [ACTIVE, INACTIVE, BLOCKED]
        country:
          type: string
        state:
          type: string
        city:
          type: string
        neighborhood:
          type: string
        address:
          type: string
        postalCode:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        paymentMethodId:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        idType:
          type: string
        idNumber:
          type: string
        phone:
          type: string
        roleId:
          type: string
        gender:
          type: string
        birthDate:
          type: string
          format: date
        status:
          type: string
          enum: [ACTIVE, INACTIVE, BLOCKED]
        country:
          type: string
        state:
          type: string
        city:
          type: string
        neighborhood:
          type: string
        address:
          type: string
        postalCode:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        paymentMethodId:
          type: string