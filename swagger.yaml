openapi: 3.0.0
info:
  title: Electiva2 Ecommerce API
  version: 1.0.0
  description: API documentation for Electiva2 Ecommerce - Envios Perdidos

servers:
  - url: http://localhost:5000

tags:
  - name: User
    description: User management
  - name: Auth
    description: Authentication endpoints
  - name: Products
    description: Product management (Admin only)
  - name: Categories
    description: Category management (Admin only)
  - name: Providers
    description: Provider management (Admin only)
  - name: Inventory
    description: Inventory and stock management
  - name: Catalog
    description: Product catalog (authenticated users)
  - name: Product
    description: Product catalog
  - name: Preorder
    description: Checkout and preorders
  - name: Order
    description: Orders

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a user and generate an access token
      description: |
        In addition to authenticating the user and generating a token, this endpoint now tracks login attempts and stores the user's email in the login attempts table for auditing purposes. After 3 failed login attempts, the user will be blocked and unable to log in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user:
    post:
      tags: [User]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/profile/{id}:
    put:
      tags:
        - User
      summary: Update a user profile (full update)
      description: Updates the full user profile. Requires authentication and profile access authorization.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden - cannot update another profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags:
        - User
      summary: Partially update a user profile
      description: Partially updates user profile fields. Requires authentication and profile access authorization.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User partially updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - User
      summary: Get user profile
      description: Retrieve a user profile by id. Requires authentication and profile access authorization.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users:
    get:
      tags:
        - User
      summary: Get all users
      description: Retrieve a list of all users.
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/product:
    get:
      tags: [Product]
      summary: List all active products with stock > 0
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
    post:
      tags: [Product]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/{userId}/preorder:
    post:
      tags: [Preorder]
      summary: Create a new preorder (checkout)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreOrderRequest'
      responses:
        '201':
          description: Preorder created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreOrderResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user/{userId}/preorder/{preorderId}/confirm:
    patch:
      tags: [Preorder]
      summary: Confirm a preorder and create an order
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: preorderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                emailNotification:
                  type: string
                  format: email
      responses:
        '200':
          description: Preorder confirmed and order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  preorder:
                    $ref: '#/components/schemas/PreOrderResponse'
                  order:
                    $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Invalid preorder status or insufficient stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Preorder not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/orders/user/{userId}:
    get:
      tags: [Order]
      summary: Get all orders for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/product:
    post:
      tags:
        - Products
      summary: Create a new product
      description: Creates a new product in the system. Requires authentication and admin role.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSuccessResponse'
        '401':
          description: Unauthorized - Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden - Admin permissions required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

    get:
      tags:
        - Products
      summary: Get all products
      description: Retrieves the complete list of products. Requires authentication and admin role.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Products list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsListResponse'
        '401':
          description: Unauthorized - Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden - Admin permissions required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/admin/product/{id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      description: Retrieves a specific product by its ID. Requires authentication and admin role.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        '200':
          description: Product retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          description: Unauthorized - Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden - Admin permissions required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

    put:
      tags:
        - Products
      summary: Update a product
      description: Updates an existing product by its ID. All fields are optional. Requires authentication and admin role.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID to update
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSuccessResponse'
        '401':
          description: Unauthorized - Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden - Admin permissions required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/product/{id}:
    delete:
      tags:
        - Products
      summary: Delete a product
      description: Deletes a product by its ID. Cannot delete products with reserved stock. Requires authentication and admin role.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID to delete
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        '200':
          description: Product deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          description: Unauthorized - Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden - Admin permissions required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal server error (may include reserved stock error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/admin/product/categories:
    post:
      tags:
        - Categories
      summary: Create a new category
      description: Creates a new product category. Requires authentication and admin role.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategorySuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

    get:
      tags:
        - Categories
      summary: Get all categories
      description: Retrieves all product categories. Requires authentication and admin role.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoriesListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/admin/product/categories/{id}:
    get:
      tags:
        - Categories
      summary: Get category by ID
      description: Retrieves a specific category by its ID. Requires authentication and admin role.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Category ID
          schema:
            type: string
            example: "507f1f77bcf86cd799439012"
      responses:
        '200':
          description: Category retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Category not found"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

    put:
      tags:
        - Categories
      summary: Update a category
      description: Updates an existing category. Requires authentication and admin role.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Category ID to update
          schema:
            type: string
            example: "507f1f77bcf86cd799439012"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategorySuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Category not found"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

    delete:
      tags:
        - Categories
      summary: Delete a category
      description: Deletes a category. Cannot delete categories associated with existing products. Requires authentication and admin role.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Category ID to delete
          schema:
            type: string
            example: "507f1f77bcf86cd799439012"
      responses:
        '200':
          description: Category deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Category not found"
        '500':
          description: Internal server error (may include products association error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/admin/product/provider:
    post:
      tags:
        - Providers
      summary: Create a new provider
      description: Creates a new provider. Requires authentication and admin role.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderRequest'
      responses:
        '201':
          description: Provider created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderSuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/admin/product/provider:
    get:
      tags:
        - Providers
      summary: Get all providers
      description: Retrieves all providers. Requires authentication and admin role.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Providers retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvidersListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/admin/product/provider/{id}:
    get:
      tags:
        - Providers
      summary: Get provider by ID
      description: Retrieves a specific provider by its ID. Requires authentication and admin role.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Provider ID
          schema:
            type: string
            example: "507f1f77bcf86cd799439013"
      responses:
        '200':
          description: Provider retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '404':
          description: Provider not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Provider not found"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

    put:
      tags:
        - Providers
      summary: Update a provider
      description: Updates an existing provider. Requires authentication and admin role.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Provider ID to update
          schema:
            type: string
            example: "507f1f77bcf86cd799439013"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderRequest'
      responses:
        '200':
          description: Provider updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderSuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '404':
          description: Provider not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Provider not found"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

    delete:
      tags:
        - Providers
      summary: Delete a provider
      description: Deletes a provider and removes it from all associated products. Requires authentication and admin role.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Provider ID to delete
          schema:
            type: string
            example: "507f1f77bcf86cd799439013"
      responses:
        '200':
          description: Provider deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '404':
          description: Provider not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Provider not found"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/admin/product/inventory/{id}:
    put:
      tags:
        - Inventory
      summary: Update product inventory
      description: Updates price and stock for a product. Requires authentication and admin role.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryUpdateRequest'
      responses:
        '200':
          description: Inventory updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventorySuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/user/cart/product/inventory/hold/{id}:
    patch:
      tags:
        - Inventory
      summary: Update reserved stock
      description: Adds or subtracts reserved stock for a product. Used for cart operations. Requires authentication (admin or user role).
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservedStockRequest'
      responses:
        '200':
          description: Reserved stock updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventorySuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal server error (may include validation errors)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /api/v1/catalog:
    get:
      tags:
        - Catalog
      summary: Get product catalog
      description: Retrieves all products with available stock (stock > 0). Includes product details, category info, price, and stock information. Requires authentication (admin or user role).
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Catalog retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerErrorResponse'

  /auth/verify-email:
    post:
      summary: Verifica el código de correo electrónico del usuario.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: usuario@correo.com
                code:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Verificación exitosa.
        "400":
          description: Código inválido o expirado.

  /auth/resend-verification-code:
    post:
      summary: Reenvía el código de verificación al correo del usuario.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: usuario@correo.com
      responses:
        "200":
          description: Código reenviado correctamente.
        "400":
          description: Error al reenviar el código.

  /api/v1/tracking:
    post:
      tags:
        - Tracking
      summary: Create tracking for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackingRequest'
      responses:
        '201':
          description: Tracking created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackingResponse'

  /api/v1/tracking/{orderNumber}:
    get:
      tags:
        - Tracking
      summary: Get tracking by order number
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tracking information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackingResponse'
        '404':
          description: Tracking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tracking/user/{userId}:
    get:
      tags:
        - Tracking
      summary: Get tracking entries for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of tracking entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrackingResponse'

  /api/v1/tracking/status:
    put:
      tags:
        - Tracking
      summary: Update tracking status
      description: Update the status of a tracking entry. Requires authentication.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackingStatusUpdate'
      responses:
        '200':
          description: Tracking status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackingResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT authentication token. Format -> Authorization Bearer {token}

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    RegisterRequest:
      type: object
      required: [email, password, name, phone]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
        phone:
          type: string

    AuthResponse:
      type: object
      properties:
        msg:
          type: string
        token:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            name:
              type: string
            phone:
              type: string

    ErrorResponse:
      type: object
      properties:
        type:
          type: string
        msg:
          type: string

    UserRequest:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
        - idType
        - idNumber
        - roleId
        - status
        - country
        - state
        - city
        - neighborhood
        - address
        - postalCode
      properties:
        email:
          type: string
          format: email
          description: Correo electrónico único del usuario
          example: usuario@correo.com
        password:
          type: string
          description: Contraseña segura (mínimo 8 caracteres, mayúsculas, minúsculas y números)
          example: Prueba123
        firstName:
          type: string
          description: Nombre del usuario
          example: Juan
        lastName:
          type: string
          description: Apellido del usuario
          example: Pérez
        idType:
          type: string
          description: Tipo de documento (cc, ti, etc)
          example: cc
        idNumber:
          type: string
          description: Número de documento
          example: 123456789
        phone:
          type: string
          description: Teléfono del usuario
          example: 3161234567
        roleId:
          type: string
          description: Rol del usuario
          enum: [USER, ADMIN]
          example: USER
        status:
          type: string
          description: Estado del usuario
          enum: [ACTIVE, INACTIVE, BLOCKED]
          example: ACTIVE
        country:
          type: string
          example: Colombia
        state:
          type: string
          example: Antioquia
        city:
          type: string
          example: Medellín
        neighborhood:
          type: string
          example: Laureles
        address:
          type: string
          example: Calle 50 #70-30
        postalCode:
          type: string
          example: 050001

    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        idType:
          type: string
        idNumber:
          type: string
        phone:
          type: string
        roleId:
          type: string
        status:
          type: string
        country:
          type: string
        state:
          type: string
        city:
          type: string
        neighborhood:
          type: string
        address:
          type: string
        postalCode:
          type: string

    UserUpdateRequest:
      type: object
      description: Fields allowed for partial user updates (all optional)
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        roleId:
          type: string
          enum: [USER, ADMIN]
        status:
          type: string
          enum: [ACTIVE, INACTIVE, BLOCKED]
        country:
          type: string
        state:
          type: string
        city:
          type: string
        neighborhood:
          type: string
        address:
          type: string
        postalCode:
          type: string

    ProductRequest:
      type: object
      required:
        - name
        - description
        - cost
        - categoryId
        - images
        - providers
      properties:
        name:
          type: string
          description: Nombre del producto
          example: Camiseta
        description:
          type: string
          description: Descripción del producto
          example: Camiseta de algodón talla M
        cost:
          type: number
          description: Precio del producto
          example: 35000
        categoryId:
          type: string
          description: ID de la categoría
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        images:
          type: array
          description: Imágenes del producto (mínimo una)
          items:
            type: string
            example: https://miapp.com/img/camiseta.jpg
        providers:
          type: array
          description: IDs de proveedores
          items:
            type: string
            example: 60f1c2e2b2e4b2e4b2e4b2e4

    ProductResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        cost:
          type: number
        categoryId:
          type: string
        images:
          type: array
          items:
            type: string
        providers:
          type: array
          items:
            type: string

    PreOrderRequest:
      type: object
      required:
        - userId
        - products
        - shippingAddress
        - paymentMethod
      properties:
        userId:
          type: string
          description: ID del usuario
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        products:
          type: array
          description: Productos en la preorden
          items:
            $ref: '#/components/schemas/PreOrderProduct'
        shippingAddress:
          $ref: '#/components/schemas/PreOrderShippingAddress'
        paymentMethod:
          type: string
          description: Método de pago
          example: tarjeta

    PreOrderProduct:
      type: object
      required:
        - productId
        - name
        - quantity
        - price
        - categoryId
      properties:
        productId:
          type: string
          description: ID del producto
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        name:
          type: string
          description: Nombre del producto
          example: Camiseta
        description:
          type: string
          description: Descripción del producto
          example: Camiseta de algodón talla M
        quantity:
          type: integer
          description: Cantidad solicitada
          example: 2
        price:
          type: number
          description: Precio unitario
          example: 35000
        categoryId:
          type: string
          description: ID de la categoría
          example: 60f1c2e2b2e4b2e4b2e4b2e4

    PreOrderShippingAddress:
      type: object
      required:
        - country
        - state
        - city
        - neighborhood
        - address
        - postalCode
      properties:
        country:
          type: string
          example: Colombia
        state:
          type: string
          example: Antioquia
        city:
          type: string
          example: Medellín
        neighborhood:
          type: string
          example: Laureles
        address:
          type: string
          example: Calle 50 #70-30
        postalCode:
          type: string
          example: 050001

    PreOrderResponse:
      type: object
      properties:
        id:
          type: string
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        userId:
          type: string
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        products:
          type: array
          items:
            $ref: '#/components/schemas/PreOrderProduct'
        shippingAddress:
          $ref: '#/components/schemas/PreOrderShippingAddress'
        paymentMethod:
          type: string
          example: tarjeta
        shippingCost:
          type: number
          example: 10000
        total:
          type: number
          example: 80000
        status:
          type: string
          enum: [PENDING, EXPIRED, CANCELLED, CONFIRMED]
          example: PENDING
        createdAt:
          type: string
          format: date-time
          example: "2024-06-10T12:00:00Z"
        updatedAt:
          type: string
          format: date-time
        paymentMethodId:
          type: string

    # Product Schemas
    Product:
      type: object
      required:
        - name
        - description
        - cost
        - categoryId
        - providers
      properties:
        id:
          type: string
          description: Product unique ID
          example: "507f1f77bcf86cd799439011"
        name:
          type: string
          minLength: 3
          maxLength: 50
          description: Product name
          example: "Laptop Dell Inspiron"
        description:
          type: string
          minLength: 10
          maxLength: 500
          description: Product description
          example: "High performance laptop with Intel i7 processor"
        cost:
          type: number
          minimum: 0
          description: Product cost
          example: 1200.50
        stock:
          type: number
          minimum: 0
          description: Available stock
          example: 50
        categoryId:
          type: string
          description: Category ID
          example: "507f1f77bcf86cd799439012"
        images:
          type: array
          items:
            type: string
          description: Product images URLs
          example: ["https://example.com/image1.jpg", "https://example.com/image2.jpg"]
        providers:
          type: array
          items:
            type: string
          description: Provider IDs
          example: ["507f1f77bcf86cd799439013"]
        isDiscontinued:
          type: boolean
          description: Indicates if product is discontinued
          example: false

    ProductUpdateRequest:
      type: object
      description: All fields are optional for updates
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 50
          example: "Laptop Dell Inspiron Updated"
        description:
          type: string
          minLength: 10
          maxLength: 500
          example: "Updated high performance laptop"
        cost:
          type: number
          minimum: 0
          example: 1100.00
        stock:
          type: number
          minimum: 0
          example: 45
        categoryId:
          type: string
          example: "507f1f77bcf86cd799439012"
        images:
          type: array
          items:
            type: string
          example: ["https://example.com/new-image.jpg"]
        providers:
          type: array
          items:
            type: string
          example: ["507f1f77bcf86cd799439013"]
        isDiscontinued:
          type: boolean
          example: false

    ProductSuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        message:
          type: string
          example: "Product created successfully"
        product:
          $ref: '#/components/schemas/Product'

    ProductsListResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'

    DeleteResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        message:
          type: string
          example: "Product deleted successfully"

    ProductErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          example: "The product name must be a string between 3 and 50 characters"

    ServerErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        message:
          type: string
          example: "Internal server error"
        error:
          type: string
          example: "Database connection failed"

    UnauthorizedResponse:
      type: object
      properties:
        error:
          type: string
          example: "Access token is required"

    ForbiddenResponse:
      type: object
      properties:
        error:
          type: string
          example: "You do not have permission to perform this action"

    # Category Schemas
    Category:
      type: object
      properties:
        id:
          type: string
          description: Category unique ID
          example: "507f1f77bcf86cd799439012"
        name:
          type: string
          description: Category name
          example: "Electronics"

    CategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Category name
          example: "Electronics"

    CategorySuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        message:
          type: string
          example: "Category created successfully"
        category:
          $ref: '#/components/schemas/Category'

    CategoriesListResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    CategoryResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        category:
          $ref: '#/components/schemas/Category'

    # Provider Schemas
    Provider:
      type: object
      properties:
        id:
          type: string
          description: Provider unique ID
          example: "507f1f77bcf86cd799439013"
        name:
          type: string
          description: Provider name
          example: "Tech Distributors Inc"

    ProviderRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Provider name
          example: "Tech Distributors Inc"

    ProviderSuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        message:
          type: string
          example: "Provider created successfully"
        provider:
          $ref: '#/components/schemas/Provider'

    ProvidersListResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        providers:
          type: array
          items:
            $ref: '#/components/schemas/Provider'

    ProviderResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        provider:
          $ref: '#/components/schemas/Provider'

    # Inventory Schemas
    Inventory:
      type: object
      properties:
        id:
          type: string
          description: Inventory record ID
          example: "507f1f77bcf86cd799439014"
        productId:
          type: string
          description: Associated product ID
          example: "507f1f77bcf86cd799439011"
        price:
          type: number
          minimum: 0
          description: Product selling price
          example: 1500.00
        stock:
          type: number
          minimum: 0
          description: Available stock
          example: 100
        reservedStock:
          type: number
          minimum: 0
          description: Stock reserved in carts
          example: 5

    InventoryUpdateRequest:
      type: object
      properties:
        price:
          type: number
          minimum: 0
          description: Product selling price (must be greater than 0)
          example: 1500.00
        stock:
          type: number
          minimum: 0
          description: Available stock (must be integer >= 0)
          example: 100

    ReservedStockRequest:
      type: object
      required:
        - reservedStock
        - action
      properties:
        reservedStock:
          type: number
          minimum: 1
          description: Amount of stock to reserve or release (must be positive)
          example: 3
        action:
          type: number
          enum: [1, 2]
          description: "Action to perform: 1 = add reserved stock, 2 = subtract reserved stock"
          example: 1

    InventorySuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        message:
          type: string
          example: "Inventory updated successfully"
        inventory:
          $ref: '#/components/schemas/Inventory'

    # Catalog Schemas
    CatalogItem:
      type: object
      properties:
        id:
          type: string
          description: Product ID
          example: "507f1f77bcf86cd799439011"
        name:
          type: string
          description: Product name
          example: "Laptop Dell Inspiron"
        description:
          type: string
          description: Product description
          example: "High performance laptop with Intel i7 processor"
        categoryId:
          type: string
          description: Category ID
          example: "507f1f77bcf86cd799439012"
        categoryName:
          type: string
          description: Category name
          example: "Electronics"
        isDiscontinued:
          type: boolean
          description: Indicates if product is discontinued
          example: false
        stock:
          type: number
          description: Available stock
          example: 50
        price:
          type: number
          description: Product selling price
          example: 1500.00
        reservedStock:
          type: number
          description: Stock reserved in carts
          example: 5
        images:
          type: array
          items:
            type: string
          description: Product images URLs
          example: ["https://example.com/image1.jpg"]

    CatalogResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        catalog:
          type: array
          items:
            $ref: '#/components/schemas/CatalogItem'
          example: "2024-06-10T12:00:00Z"

    OrderResponse:
      type: object
      properties:
        id:
          type: string
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        orderNumber:
          type: string
          example: ORD-20240610-ABCDE
        preorderId:
          type: string
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        userId:
          type: string
          example: 60f1c2e2b2e4b2e4b2e4b2e4
        products:
          type: array
          items:
            $ref: '#/components/schemas/PreOrderProduct'
        shippingAddress:
          $ref: '#/components/schemas/PreOrderShippingAddress'
        paymentMethod:
          type: string
          example: tarjeta
        shippingCost:
          type: number
          example: 10000
        total:
          type: number
          example: 80000
        status:
          type: string
          enum: [PENDING, CONFIRMED, PROCESSING, SHIPPED, DELIVERED, CANCELLED, REFUNDED]
          example: PENDING
        createdAt:
          type: string
          format: date-time
          example: "2024-06-10T12:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-10T12:00:00Z"
        confirmedAt:
          type: string
          format: date-time
          example: "2024-06-10T12:05:00Z"
        emailSent:
          type: boolean
          example: true
    
    # Tracking Schemas
    TrackingRequest:
      type: object
      required:
        - orderNumber
        - status
      properties:
        orderNumber:
          type: string
          description: Order number associated with the tracking
        status:
          type: string
          description: Initial tracking status
          example: PENDING
        location:
          type: string
          description: Current location info (optional)
        details:
          type: string
          description: Additional details about the tracking

    TrackingResponse:
      type: object
      properties:
        id:
          type: string
        orderNumber:
          type: string
        status:
          type: string
        location:
          type: string
        details:
          type: string
        updatedAt:
          type: string
          format: date-time

    TrackingStatusUpdate:
      type: object
      required:
        - orderNumber
        - status
      properties:
        orderNumber:
          type: string
        status:
          type: string
        location:
          type: string
        details:
          type: string
  /auth/verify-email:
    post:
      summary: Verifica el código de correo electrónico del usuario.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: usuario@correo.com
                code:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Verificación exitosa.
        "400":
          description: Código inválido o expirado.

  /auth/resend-verification-code:
    post:
      summary: Reenvía el código de verificación al correo del usuario.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: usuario@correo.com
      responses:
        "200":
          description: Código reenviado correctamente.
        "400":
          description: Error al reenviar el código.

